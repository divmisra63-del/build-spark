name: Keep Alive

on:
  schedule:
    - cron: "0 0 1 * *"   # 1st of every month

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump last-active timestamp
        run: |
          echo "$(date -u +"%Y-%m-%d")" > last-active.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-active.txt
          git commit -m "chore: keep-alive $(date -u +"%Y-%m")"
          git push
